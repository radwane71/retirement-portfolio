<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محفظتي - تسجيل الدخول</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">📈</div>
        <h1>محفظتي</h1>
        <p>نظام تتبع محفظة التقاعد الشخصية</p>
      </div>

      <div class="tab-group">
        <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="tab-btn" id="tab-register" onclick="switchTab('register')">إنشاء حساب</button>
      </div>

      <div id="error-msg" class="error-msg"></div>
      <div id="success-msg" class="success-msg"></div>

      <!-- Login Form -->
      <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="login-email" placeholder="example@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="login-btn">
          تسجيل الدخول
        </button>
      </form>

      <!-- Register Form -->
      <form class="login-form" id="register-form" onsubmit="handleRegister(event)" style="display:none">
        <div class="form-group">
          <label>البريد الإلكتروني</label>
          <input type="email" id="reg-email" placeholder="example@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" id="reg-password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>تأكيد كلمة المرور</label>
          <input type="password" id="reg-confirm" placeholder="••••••••" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="reg-btn">
          إنشاء الحساب
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    // Redirect if already logged in
    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    })();

    function switchTab(tab) {
      const isLogin = tab === 'login';
      document.getElementById('tab-login').classList.toggle('active', isLogin);
      document.getElementById('tab-register').classList.toggle('active', !isLogin);
      document.getElementById('login-form').style.display    = isLogin ? '' : 'none';
      document.getElementById('register-form').style.display = isLogin ? 'none' : '';
      clearMessages();
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('success-msg').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('error-msg').style.display = 'none';
    }

    function clearMessages() {
      document.getElementById('error-msg').style.display = 'none';
      document.getElementById('success-msg').style.display = 'none';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.textContent = loading ? 'جارٍ التحميل...' : (btnId === 'login-btn' ? 'تسجيل الدخول' : 'إنشاء الحساب');
    }

    async function handleLogin(e) {
      e.preventDefault();
      clearMessages();
      setLoading('login-btn', true);
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
      setLoading('login-btn', false);

      if (error) { showError(error.message === 'Invalid login credentials' ? 'بريد إلكتروني أو كلمة مرور غير صحيحة' : error.message); return; }
      window.location.href = 'dashboard.html';
    }

    async function handleRegister(e) {
      e.preventDefault();
      clearMessages();
      const email    = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm  = document.getElementById('reg-confirm').value;

      if (password !== confirm) { showError('كلمتا المرور غير متطابقتين'); return; }
      if (password.length < 6)  { showError('يجب أن تكون كلمة المرور 6 أحرف على الأقل'); return; }

      setLoading('reg-btn', true);
      const { error } = await supabaseClient.auth.signUp({ email, password });
      setLoading('reg-btn', false);

      if (error) { showError(error.message); return; }
      showSuccess('تم إنشاء الحساب! تحقق من بريدك الإلكتروني لتأكيد الحساب، ثم سجّل الدخول.');
      switchTab('login');
    }
  </script>
</body>
</html>
