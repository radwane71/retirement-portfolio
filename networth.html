<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صافي الثروة - محفظتي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <h2>📈 محفظتي</h2>
      <p>تتبع محفظة التقاعد</p>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html"    class="nav-link" id="nav-dashboard"><span class="icon">📊</span><span>لوحة التحكم</span></a>
      <a href="transactions.html" class="nav-link" id="nav-transactions"><span class="icon">💹</span><span>سجل المعاملات</span></a>
      <a href="dividends.html"    class="nav-link" id="nav-dividends"><span class="icon">💰</span><span>الأرباح الموزعة</span></a>
      <a href="cashflows.html"    class="nav-link" id="nav-cashflows"><span class="icon">📈</span><span>التدفقات النقدية</span></a>
      <a href="networth.html"     class="nav-link" id="nav-networth"><span class="icon">🏦</span><span>صافي الثروة</span></a>
      <a href="realestate.html"   class="nav-link" id="nav-realestate"><span class="icon">🏠</span><span>العقارات</span></a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()"><span>🚪</span><span>تسجيل الخروج</span></button>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <div class="page-header-text">
        <h1>صافي الثروة</h1>
        <p>تتبع نمو الثروة الإجمالية عبر الزمن</p>
      </div>
    </div>

    <!-- Add Snapshot Form -->
    <div class="card">
      <div class="section-header">
        <span class="section-title">إضافة لقطة جديدة</span>
      </div>
      <form id="nw-form" onsubmit="addSnapshot(event)">
        <div class="form-grid">
          <div class="form-group">
            <label>التاريخ *</label>
            <input type="date" id="nw-date" required>
          </div>
          <div class="form-group">
            <label>صافي الثروة الإجمالي (ر.س) *</label>
            <input type="number" id="nw-value" step="0.01" min="0" placeholder="0.00" required>
          </div>
          <div class="form-group" style="grid-column: span 2">
            <label>ملاحظات</label>
            <input type="text" id="nw-notes" placeholder="أي ملاحظات اختيارية...">
          </div>
        </div>
        <div class="mt-4 flex gap-3" style="justify-content:flex-end">
          <button type="reset" class="btn btn-secondary">إعادة تعيين</button>
          <button type="submit" class="btn btn-primary">حفظ اللقطة</button>
        </div>
      </form>
    </div>

    <!-- Chart -->
    <div class="card">
      <div class="section-header">
        <span class="section-title">مسار صافي الثروة</span>
      </div>
      <div class="chart-container" style="height:320px">
        <canvas id="nwChart"></canvas>
      </div>
    </div>

    <!-- Snapshots Table -->
    <div class="card">
      <div class="section-header">
        <span class="section-title">جميع اللقطات</span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>التاريخ</th>
              <th>صافي الثروة</th>
              <th>التغيير</th>
              <th>ملاحظات</th>
              <th>حذف</th>
            </tr>
          </thead>
          <tbody id="nw-tbody">
            <tr><td colspan="5"><div class="empty-state"><div class="icon">⏳</div><p>جارٍ التحميل...</p></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/networth.js"></script>
</body>
</html>
